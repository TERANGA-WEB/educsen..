<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logo EDUCSEN - Animation Drawing & Glow</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .logo-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2rem;
        }

        .icon-container {
            width: 11.7rem; 
            height: 11.7rem;
            position: relative;
        }

        .svg-icon {
            width: 100%;
            height: 100%;
            filter: drop-shadow(0 0 0px rgba(2, 209, 225, 0));
            animation: glowIcon 2s ease-in-out 2.5s forwards;
        }

        /* Animation de dessin des traits */
        .drawing-path {
            stroke-dasharray: 600;
            stroke-dashoffset: 600;
            animation: drawLines 2.5s ease-out forwards;
        }

        .logo-text {
            font-weight: bold;
            font-size: 4.8rem; 
            font-family: sans-serif;
            color: #2a2a72; 
            opacity: 0;
            letter-spacing: 15px; /* Commence très espacé */
            animation: revealText 1.2s cubic-bezier(0.22, 1, 0.36, 1) 2s forwards;
        }

        .svg-text-ia {
            font-weight: bold;
            font-size: 24px;
            font-family: sans-serif;
            fill: #2a2a72;
            opacity: 0;
            animation: fadeInIA 1s ease-out 2.2s forwards;
        }

        /* KEYFRAMES */

        /* Dessin des lignes */
        @keyframes drawLines {
            to {
                stroke-dashoffset: 0;
            }
        }

        /* Effet de lueur finale */
        @keyframes glowIcon {
            to {
                filter: drop-shadow(0 0 8px rgba(2, 209, 225, 0.5));
            }
        }

        /* Apparition du texte avec resserrement des lettres */
        @keyframes revealText {
            from {
                opacity: 0;
                letter-spacing: 15px;
                transform: scale(0.9);
            }
            to {
                opacity: 1;
                letter-spacing: 2px;
                transform: scale(1);
            }
        }

        /* Apparition douce du IA central */
        @keyframes fadeInIA {
            to {
                opacity: 1;
            }
        }
    </style>
</head>
<body>

    <div class="logo-container">
        <div class="icon-container">
            <svg viewBox="0 0 100 115" class="svg-icon" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <linearGradient id="iconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:#2a2a72;stop-opacity:1" />
                        <stop offset="100%" style="stop-color:#02d1e1;stop-opacity:1" />
                    </linearGradient>
                </defs>

                <path class="drawing-path" d="
                    M 50 0 L 100 28.75 L 100 86.25 L 50 115 L 0 86.25 L 0 28.75 Z
                    M 50 0 L 100 86.25 L 0 86.25 Z
                    M 100 28.75 L 50 115 L 0 28.75 Z
                "
                stroke="url(#iconGradient)"
                stroke-width="3"
                fill="none" /> 

                <path class="drawing-path" d="
                    M 50 28.5 L 75 42.9 L 75 72.1 L 50 86.5 L 25 72.1 L 25 42.9 Z
                "
                stroke="url(#iconGradient)"
                stroke-width="3"
                fill="none" /> 

                <text x="50" y="57.5" text-anchor="middle" dominant-baseline="central" class="svg-text-ia">IA</text>
            </svg>
        </div>

        <div class="logo-text">EDUCSEN</div>
    </div>

</body>
</html>

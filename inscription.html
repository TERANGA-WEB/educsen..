<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Inscription - Edusen</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        body{
            font-family: 'Inter', sans-serif;
            background:#f5f7fb;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            margin:0;
        }

        .card{
            background:white;
            padding:40px;
            border-radius:20px;
            box-shadow:0 10px 30px rgba(0,0,0,0.08);
            width:100%;
            max-width:420px;
        }

        h2{
            text-align:center;
            margin-bottom:25px;
        }

        input{
            width:100%;
            padding:15px;
            border-radius:10px;
            border:1px solid #ddd;
            margin-bottom:20px;
            font-size:15px;
        }

        button{
            width:100%;
            padding:15px;
            border:none;
            border-radius:10px;
            background:#2563eb;
            color:white;
            font-size:16px;
            font-weight:600;
            cursor:pointer;
        }

        button:disabled{
            opacity:0.6;
            cursor:not-allowed;
        }

        .alert{
            padding:12px;
            border-radius:8px;
            margin-bottom:15px;
            display:none;
            font-size:14px;
        }

        .success{
            background:#e6fffa;
            color:#065f46;
        }

        .error{
            background:#fee2e2;
            color:#991b1b;
        }
    </style>
</head>

<body>

<div class="card">

    <h2>Créer un compte</h2>

    <div id="alert" class="alert"></div>

    <input type="email" id="email" placeholder="Votre email" required>

    <button onclick="register()" id="btn">
        Recevoir le lien
    </button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, sendSignInLinkToEmail } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
    apiKey: "AIzaSyD7B-0O9mOdbIDQV-g6hsZx07G2ZvzKoxo",
    authDomain: "real-educsen.firebaseapp.com",
    projectId: "real-educsen",
    storageBucket: "real-educsen.firebasestorage.app",
    messagingSenderId: "80660233362",
    appId: "1:80660233362:web:5edf5060254170056eba4b"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

const alertBox = document.getElementById("alert");
const btn = document.getElementById("btn");

window.register = async function(){

    const email = document.getElementById("email").value.trim();

    alertBox.style.display = "none";

    if(!email){
        showError("Veuillez entrer un email valide.");
        return;
    }

    btn.disabled = true;
    btn.innerText = "Envoi en cours...";

    const actionCodeSettings = {
        url: window.location.origin + "/login-success.html",
        handleCodeInApp: true
    };

    try{

        await sendSignInLinkToEmail(auth, email, actionCodeSettings);

        localStorage.setItem("emailForSignIn", email);

        showSuccess("Lien envoyé ! Vérifiez votre email.");

    }catch(error){

        console.error(error);

        if(error.code === "auth/unauthorized-continue-uri"){
            showError("Domaine non autorisé dans Firebase.");
        }
        else if(error.code === "auth/quota-exceeded"){
            showError("Quota journalier dépassé.");
        }
        else{
            showError("Erreur : " + error.message);
        }

    }finally{
        btn.disabled = false;
        btn.innerText = "Recevoir le lien";
    }
}

function showSuccess(msg){
    alertBox.className = "alert success";
    alertBox.innerText = msg;
    alertBox.style.display = "block";
}

function showError(msg){
    alertBox.className = "alert error";
    alertBox.innerText = msg;
    alertBox.style.display = "block";
}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Connexion · ÉducSen</title>
    <!-- Police moderne -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* ===== DESIGN MODERNE, CENTRÉ, RESPONSIVE ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: linear-gradient(145deg, #f6f9fc 0%, #edf2f7 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        .container {
            max-width: 480px;
            width: 100%;
        }

        .card {
            background: white;
            border-radius: 32px;
            padding: 2.5rem 2rem;
            box-shadow: 0 20px 35px -8px rgba(0, 20, 30, 0.15);
            border: 1px solid rgba(255,255,255,0.3);
        }

        h1 {
            font-size: 1.9rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            color: #0a2e4a;
            margin-bottom: 0.5rem;
        }

        .subhead {
            font-size: 0.95rem;
            color: #4a6877;
            margin-bottom: 2rem;
            font-weight: 400;
            border-bottom: 1px solid #e2e8f0;
            padding-bottom: 1rem;
        }

        .form-group {
            margin-bottom: 1.8rem;
        }

        label {
            display: block;
            font-weight: 600;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #1e4c6b;
            margin-bottom: 0.6rem;
        }

        input[type="email"] {
            width: 100%;
            padding: 1rem 1.2rem;
            border: 2px solid #e2e8f0;
            border-radius: 18px;
            font-size: 1rem;
            transition: border 0.2s, box-shadow 0.2s;
            outline: none;
            background: white;
        }

        input[type="email"]:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
        }

        input.error {
            border-color: #e53e3e;
            background-color: #fff5f5;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            background: linear-gradient(135deg, #1e4c6b, #113946);
            color: white;
            font-weight: 600;
            font-size: 1.1rem;
            padding: 1rem 1.5rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.25s ease;
            box-shadow: 0 8px 18px rgba(17, 57, 70, 0.2);
            margin-top: 0.5rem;
            gap: 0.6rem;
        }

        .btn:hover:not(:disabled) {
            transform: scale(1.02);
            background: linear-gradient(135deg, #1f5579, #0e3b4a);
            box-shadow: 0 12px 24px rgba(17, 57, 70, 0.3);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            background: #94a3b8;
            box-shadow: none;
        }

        .spinner {
            display: inline-block;
            width: 1.2rem;
            height: 1.2rem;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .message-box {
            margin-top: 1.8rem;
            padding: 1rem 1.2rem;
            border-radius: 14px;
            font-size: 0.95rem;
            font-weight: 500;
            display: none;
        }

        .message-box.success {
            display: block;
            background: #e6f7e6;
            color: #1e7a44;
            border-left: 4px solid #2ecc71;
        }

        .message-box.error {
            display: block;
            background: #fff5f5;
            color: #c53030;
            border-left: 4px solid #c53030;
        }

        .info-text {
            margin-top: 1.8rem;
            font-size: 0.8rem;
            color: #5e7a8c;
            text-align: center;
            background: #f0f6fa;
            padding: 0.8rem;
            border-radius: 14px;
        }

        .hidden {
            display: none;
        }

        @media (max-width: 400px) {
            .card { padding: 1.8rem 1.2rem; }
            h1 { font-size: 1.6rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>🔐 Connexion · ÉducSen</h1>
            <div class="subhead">Entrez votre email pour recevoir un lien de connexion sécurisé</div>

            <!-- Formulaire email -->
            <form id="loginForm">
                <div class="form-group">
                    <label for="emailInput">Adresse email</label>
                    <input type="email" id="emailInput" placeholder="exemple@domaine.fr" required autocomplete="email">
                </div>

                <button type="submit" id="submitBtn" class="btn">
                    <span id="btnText">Envoyer le lien</span>
                    <span id="btnSpinner" class="spinner hidden"></span>
                </button>
            </form>

            <!-- Zone d'affichage des messages (succès / erreur) -->
            <div id="messageBox" class="message-box"></div>

            <div class="info-text">
                📧 Un email contenant un lien de connexion vous sera envoyé.
            </div>
        </div>
    </div>

    <script type="module">
        // ---------- FIREBASE v9 MODULAR (CDN) ----------
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-app.js";
        import { getAuth, sendSignInLinkToEmail } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-auth.js";

        // ---------- CONFIGURATION FOURNIE ----------
        const firebaseConfig = {
            apiKey: "AIzaSyD7B-0O9mOdbIDQV-g6hsZx07G2ZvzKoxo",
            authDomain: "real-educsen.firebaseapp.com",
            projectId: "real-educsen",
            storageBucket: "real-educsen.firebasestorage.app",
            messagingSenderId: "80660233362",
            appId: "1:80660233362:web:5edf5060254170056eba4b"
        };

        // Initialisation Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // ---------- ÉLÉMENTS DOM ----------
        const loginForm = document.getElementById('loginForm');
        const emailInput = document.getElementById('emailInput');
        const submitBtn = document.getElementById('submitBtn');
        const btnText = document.getElementById('btnText');
        const btnSpinner = document.getElementById('btnSpinner');
        const messageBox = document.getElementById('messageBox');

        // ---------- CONFIGURATION DU LIEN MAGIQUE ----------
        // L'URL doit pointer vers connexion-success.html (même origine)
        const getActionCodeSettings = () => {
            // Construction dynamique de l'URL de redirection après clic sur le lien
            const url = new URL(window.location.href);
            // Remplacer le nom du fichier actuel par connexion-success.html
            // Si on est sur localhost ou en production, ça fonctionne
            let redirectUrl;
            if (url.pathname.endsWith('connexion.html')) {
                redirectUrl = url.href.replace('connexion.html', 'connexion-success.html');
            } else {
                // Fallback : on ajoute /connexion-success.html à l'origine
                redirectUrl = `${url.origin}/connexion-success.html`;
            }

            return {
                url: redirectUrl,
                handleCodeInApp: true
            };
        };

        // ---------- GESTIONNAIRE D'ENVOI DU LIEN ----------
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = emailInput.value.trim();

            // Validation simple
            if (!email || !isValidEmail(email)) {
                showMessage('Veuillez entrer une adresse email valide.', 'error');
                emailInput.classList.add('error');
                return;
            }

            emailInput.classList.remove('error');
            
            // Activer le loader
            setLoadingState(true);
            hideMessage();

            try {
                const actionCodeSettings = getActionCodeSettings();
                
                await sendSignInLinkToEmail(auth, email, actionCodeSettings);
                
                // Stocker l'email pour la page de confirmation
                localStorage.setItem('emailForSignIn', email);
                
                // Afficher message de succès
                showMessage('✅ Lien envoyé ! Vérifiez votre boîte email.', 'success');
                
                // Désactiver le bouton pour éviter les envois multiples
                submitBtn.disabled = true;
                emailInput.disabled = true; // Optionnel : verrouiller l'input
                
            } catch (error) {
                console.error('Erreur sendSignInLinkToEmail :', error);
                
                let errorMessage = 'Erreur lors de l\'envoi du lien.';
                if (error.code === 'auth/too-many-requests') {
                    errorMessage = 'Trop de demandes. Veuillez réessayer plus tard.';
                } else if (error.code === 'auth/invalid-email') {
                    errorMessage = 'Email invalide.';
                } else if (error.code === 'auth/unauthorized-continue-uri') {
                    errorMessage = 'Domaine non autorisé. Vérifiez Firebase Console.';
                }
                
                showMessage(`❌ ${errorMessage}`, 'error');
                setLoadingState(false);
            }
        });

        // ---------- FONCTIONS UTILITAIRES ----------
        function isValidEmail(email) {
            return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
        }

        function setLoadingState(isLoading) {
            if (isLoading) {
                btnText.textContent = 'Envoi en cours';
                btnSpinner.classList.remove('hidden');
                submitBtn.disabled = true;
            } else {
                btnText.textContent = 'Envoyer le lien';
                btnSpinner.classList.add('hidden');
                submitBtn.disabled = false;
                emailInput.disabled = false;
            }
        }

        function showMessage(text, type) {
            messageBox.textContent = text;
            messageBox.className = 'message-box'; // Reset
            messageBox.classList.add(type);
        }

        function hideMessage() {
            messageBox.textContent = '';
            messageBox.className = 'message-box';
        }

        // Supprimer la classe error quand l'utilisateur tape
        emailInput.addEventListener('input', () => {
            emailInput.classList.remove('error');
        });

        // Réactiver le formulaire si l'utilisateur modifie l'email après succès
        emailInput.addEventListener('focus', () => {
            if (submitBtn.disabled) {
                setLoadingState(false);
                emailInput.disabled = false;
            }
        });
    </script>
</body>
</html>

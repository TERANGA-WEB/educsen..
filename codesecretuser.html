<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Code secret · ÉducSen</title>
    <!-- Police moderne -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* ===== STYLE ULTRA-PREMIUM POUR PAGE CODE SECRET ===== */
        /* VARIABLES DE LA CHARTE EDUSEN */
        :root {
            --primary: #3b82f6;
            --primary-dark: #2563eb;
            --primary-light: #93c5fd;
            --accent: #8b5cf6;
            --gradient: linear-gradient(145deg, #3b82f6, #8b5cf6);
            --gradient-glow: linear-gradient(145deg, #4f8df9, #9d70f7);
            --surface: rgba(255, 255, 255, 0.85);
            --surface-dark: rgba(15, 23, 42, 0.05);
            --text-primary: #0f172a;
            --text-secondary: #334155;
            --text-tertiary: #64748b;
            --error: #ef4444;
            --error-light: #fee2e2;
            --success: #10b981;
            --shadow-sm: 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            --shadow-md: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 30px 40px -15px rgba(59, 130, 246, 0.3);
            --shadow-inner: inset 0 2px 4px 0 rgba(255,255,255,0.8);
            --border-light: 1px solid rgba(255,255,255,0.6);
            --radius-card: 40px;
            --radius-input: 24px;
            --radius-button: 60px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: radial-gradient(circle at 10% 20%, #d9e9ff, #b7d3f0 90%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            position: relative;
            overflow-x: hidden;
        }

        /* Éléments décoratifs (cercles flous) */
        body::before {
            content: '';
            position: absolute;
            width: 60vmin;
            height: 60vmin;
            background: radial-gradient(circle, rgba(139, 92, 246, 0.2) 0%, transparent 70%);
            top: 0;
            right: 0;
            border-radius: 50%;
            transform: translate(20%, -20%);
            z-index: 0;
        }

        body::after {
            content: '';
            position: absolute;
            width: 80vmin;
            height: 80vmin;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.15) 0%, transparent 70%);
            bottom: 0;
            left: 0;
            border-radius: 50%;
            transform: translate(-20%, 20%);
            z-index: 0;
        }

        .container {
            max-width: 480px;
            width: 100%;
            margin: 0 auto;
            position: relative;
            z-index: 10;
        }

        /* Carte principale avec effet verre et lueur */
        .card {
            background: var(--surface);
            backdrop-filter: blur(16px) saturate(180%);
            -webkit-backdrop-filter: blur(16px) saturate(180%);
            border-radius: var(--radius-card);
            padding: 2.8rem 2.2rem;
            box-shadow: var(--shadow-lg), 0 0 0 1px rgba(255,255,255,0.7) inset;
            border: var(--border-light);
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: scale(1.01);
        }

        /* Titre principal avec icône intégrée */
        h1 {
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            background: var(--gradient);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 0.25rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        h1::before {
            content: '🔐';
            font-size: 2.4rem;
            filter: drop-shadow(0 4px 6px rgba(59,130,246,0.3));
        }

        /* Sous-titre élégant */
        .subhead {
            font-size: 1rem;
            color: var(--text-tertiary);
            margin-bottom: 2.2rem;
            font-weight: 400;
            padding-bottom: 1rem;
            border-bottom: 2px dashed rgba(100, 116, 139, 0.2);
        }

        /* Étiquette du code avec icône */
        .code-label {
            display: block;
            font-weight: 600;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--primary-dark);
            margin-bottom: 0.75rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .code-label::before {
            content: '✧';
            font-size: 1.2rem;
            color: var(--accent);
        }

        /* Groupe des inputs */
        .code-inputs {
            display: flex;
            gap: 0.85rem;
            justify-content: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        /* Boîtes de chiffres - style raffiné */
        .digit-box {
            width: 5rem;
            height: 5.5rem;
            background: rgba(255,255,255,0.9);
            border: 2px solid rgba(203, 213, 225, 0.6);
            border-radius: var(--radius-input);
            font-size: 2.8rem;
            font-weight: 700;
            text-align: center;
            color: var(--text-primary);
            transition: all 0.25s cubic-bezier(0.2, 0.9, 0.3, 1.2);
            outline: none;
            caret-color: var(--primary);
            box-shadow: 0 8px 12px -8px rgba(0,0,0,0.1), var(--shadow-inner);
            line-height: 1;
        }

        .digit-box:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 5px rgba(59, 130, 246, 0.2), 0 8px 16px -8px var(--primary-light);
            background-color: #ffffff;
            transform: translateY(-3px);
        }

        .digit-box.error {
            border-color: var(--error);
            background-color: var(--error-light);
            animation: shake 0.3s cubic-bezier(0.36, 0.07, 0.19, 0.97) both;
            box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.2);
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-5px); }
            40% { transform: translateX(5px); }
            60% { transform: translateX(-3px); }
            80% { transform: translateX(3px); }
        }

        /* Supprimer les flèches sur input number */
        .digit-box::-webkit-outer-spin-button,
        .digit-box::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        .digit-box[type=number] {
            -moz-appearance: textfield;
        }

        /* Bouton principal avec effet shine */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            background: var(--gradient);
            color: white;
            font-weight: 700;
            font-size: 1.2rem;
            padding: 1.1rem 1.8rem;
            border: none;
            border-radius: var(--radius-button);
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 12px 24px -8px rgba(59, 130, 246, 0.5);
            margin-top: 0.5rem;
            gap: 0.8rem;
            position: relative;
            overflow: hidden;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.7s ease;
        }

        .btn:hover::before {
            left: 100%;
        }

        .btn:hover:not(:disabled) {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 20px 30px -8px rgba(37, 99, 235, 0.6);
            background: var(--gradient-glow);
        }

        .btn:active:not(:disabled) {
            transform: translateY(0) scale(0.98);
        }

        .btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            box-shadow: none;
            background: linear-gradient(145deg, #94a3b8, #64748b);
        }

        /* Spinner */
        .spinner {
            display: inline-block;
            width: 1.3rem;
            height: 1.3rem;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.9s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Message d'erreur raffiné */
        .error-message {
            color: #b91c1c;
            background: rgba(254, 226, 226, 0.7);
            backdrop-filter: blur(4px);
            border-radius: 18px;
            padding: 1rem 1.2rem;
            margin-top: 1.8rem;
            font-size: 0.95rem;
            border-left: 5px solid var(--error);
            font-weight: 600;
            display: none;
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.2);
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .error-message.show {
            display: block;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Info bas de carte */
        .info-text {
            margin-top: 2rem;
            font-size: 0.85rem;
            color: var(--text-tertiary);
            text-align: center;
            background: rgba(241, 245, 249, 0.4);
            backdrop-filter: blur(4px);
            padding: 0.9rem;
            border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.4rem;
        }

        .info-text::before {
            content: '🛡️';
            font-size: 1rem;
        }

        /* Loader initial */
        .loader-init {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 3.5rem 1rem;
            color: var(--primary-dark);
        }

        .loader-init .spinner {
            border-top-color: var(--primary);
            border: 4px solid rgba(59, 130, 246, 0.15);
            border-top-color: var(--primary);
            width: 3rem;
            height: 3rem;
            margin-bottom: 1.5rem;
        }

        .loader-init p {
            font-weight: 600;
            color: var(--text-primary);
            background: rgba(255,255,255,0.3);
            backdrop-filter: blur(4px);
            padding: 0.6rem 1.2rem;
            border-radius: 40px;
            border: 1px solid rgba(255,255,255,0.8);
        }

        .hidden {
            display: none !important;
        }

        .code-form {
            transition: opacity 0.4s;
        }

        /* Responsive */
        @media (max-width: 400px) {
            .card { padding: 2rem 1.2rem; }
            .digit-box { width: 4rem; height: 4.8rem; font-size: 2.2rem; }
            h1 { font-size: 1.8rem; }
            h1::before { font-size: 2rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <!-- Écran de chargement initial -->
            <div id="initLoader" class="loader-init">
                <div class="spinner"></div>
                <p>Vérification de votre session</p>
            </div>

            <!-- Formulaire code secret (caché par défaut) -->
            <div id="codeFormContainer" class="code-form hidden">
                <h1>Votre code secret</h1>
              

              
                <div class="code-inputs" id="codeInputsGroup">
                    <input type="text" inputmode="numeric" pattern="\d*" maxlength="1" class="digit-box" id="digit1" autofocus>
                    <input type="text" inputmode="numeric" pattern="\d*" maxlength="1" class="digit-box" id="digit2">
                    <input type="text" inputmode="numeric" pattern="\d*" maxlength="1" class="digit-box" id="digit3">
                    <input type="text" inputmode="numeric" pattern="\d*" maxlength="1" class="digit-box" id="digit4">
                </div>

                <button class="btn" id="submitBtn" disabled>
                    <span id="btnText">Se connecter</span>
                    <span id="btnSpinner" class="spinner hidden"></span>
                </button>

                <div id="errorBox" class="error-message"></div>
                <div class="info-text">
                    Connexion sécurisée
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        // ---------- FIREBASE v9 MODULAR ----------
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore.js";

        // ---------- CONFIGURATION ----------
        const firebaseConfig = {
            apiKey: "AIzaSyD7B-0O9mOdbIDQV-g6hsZx07G2ZvzKoxo",
            authDomain: "real-educsen.firebaseapp.com",
            projectId: "real-educsen",
            storageBucket: "real-educsen.firebasestorage.app",
            messagingSenderId: "80660233362",
            appId: "1:80660233362:web:5edf5060254170056eba4b"
        };

        // ---------- INITIALISATION ----------
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // ---------- ÉLÉMENTS DOM ----------
        const initLoader = document.getElementById('initLoader');
        const formContainer = document.getElementById('codeFormContainer');
        const digit1 = document.getElementById('digit1');
        const digit2 = document.getElementById('digit2');
        const digit3 = document.getElementById('digit3');
        const digit4 = document.getElementById('digit4');
        const submitBtn = document.getElementById('submitBtn');
        const btnText = document.getElementById('btnText');
        const btnSpinner = document.getElementById('btnSpinner');
        const errorBox = document.getElementById('errorBox');

        const digitInputs = [digit1, digit2, digit3, digit4];

        // ---------- 1. VÉRIFICATION AUTH & LOCALSTORAGE ----------
        onAuthStateChanged(auth, async (user) => {
            // Cacher le loader
            initLoader.style.display = 'none';

            // Vérifier connexion Firebase
            if (!user) {
                window.location.replace('connexion.html');
                return;
            }
// Vérifier que les données essentielles sont présentes
const userEmail = localStorage.getItem('userEmail');
const userUid = localStorage.getItem('userUid');

if (!userEmail || !userUid) {
    console.warn('Données locales manquantes, redirection vers connexion...');
    window.location.replace('connexion.html');
    return;
}

// Toutes les vérifications sont OK, on affiche le formulaire
formContainer.classList.remove('hidden');
window.currentUser = user; // pour utilisation ultérieure

          
            // Initialiser la gestion des inputs
            setupCodeValidation();
        });

        // ---------- 2. VALIDATION DES 4 CHIFFRES ----------
        function setupCodeValidation() {
            digitInputs.forEach((input, index) => {
                // Forcer chiffres uniquement
                input.addEventListener('input', function(e) {
                    this.value = this.value.replace(/[^0-9]/g, '');
                    if (this.value.length > 1) {
                        this.value = this.value.charAt(0);
                    }

                    // Passer au champ suivant
                    if (this.value.length === 1 && index < digitInputs.length - 1) {
                        digitInputs[index + 1].focus();
                    }

                    validateAllDigits();
                });

                // Recul arrière
                input.addEventListener('keydown', function(e) {
                    if (e.key === 'Backspace' && this.value.length === 0 && index > 0) {
                        digitInputs[index - 1].focus();
                    }
                });

                // Coller
                input.addEventListener('paste', function(e) {
                    e.preventDefault();
                    const paste = (e.clipboardData || window.clipboardData).getData('text');
                    const digits = paste.replace(/[^0-9]/g, '').split('');
                    digits.forEach((digit, i) => {
                        if (i < digitInputs.length) {
                            digitInputs[i].value = digit;
                        }
                    });
                    const lastIndex = Math.min(digits.length, digitInputs.length) - 1;
                    if (lastIndex >= 0) {
                        digitInputs[lastIndex].focus();
                    }
                    validateAllDigits();
                });
            });

            validateAllDigits();
        }

        function isCodeComplete() {
            return digitInputs.every(input => /^[0-9]$/.test(input.value));
        }

        function validateAllDigits() {
            const complete = isCodeComplete();
            submitBtn.disabled = !complete;

            digitInputs.forEach(input => input.classList.remove('error'));
            if (!complete) {
                digitInputs.forEach(input => {
                    if (input.value === '' || !/^[0-9]$/.test(input.value)) {
                        input.classList.add('error');
                    }
                });
            }
        }

        // ---------- 3. GESTIONNAIRE DE CONNEXION (clic bouton) ----------
        submitBtn.addEventListener('click', handleCodeVerification);

        async function handleCodeVerification() {
            // S'assurer que l'utilisateur est toujours connecté
            const user = auth.currentUser;
            if (!user) {
                window.location.replace('connexion.html');
                return;
            }

            // Vérifier que le code est complet
            if (!isCodeComplete()) {
                errorBox.textContent = 'Veuillez saisir les 4 chiffres.';
                errorBox.classList.add('show');
                return;
            }

            // Récupérer le code saisi
            const enteredCode = digitInputs.map(input => input.value).join('');

            // Activer le loader
            setLoadingState(true);
            errorBox.classList.remove('show');

            try {
                // Récupérer le document Firestore de l'utilisateur
                const userDocRef = doc(db, 'users', user.uid);
                const userSnap = await getDoc(userDocRef);

                if (!userSnap.exists()) {
                    // Document non trouvé → probablement jamais passé par createcodesecret.html
                    throw new Error('Aucun code secret trouvé. Veuillez créer un code.');
                }

                const userData = userSnap.data();

                // Vérifications : email et code secret
                const emailMatch = (userData.email === user.email);
                const codeMatch = (userData.codeSecret === enteredCode);

                if (!emailMatch || !codeMatch) {
                    throw new Error('Code incorrect ou compte non valide.');
                }
if (userData.isConfigured === false) {
    window.location.replace('config.html');
} else {
    window.location.replace('userdashboard.html');
}


            } catch (error) {
                console.error('Erreur de vérification :', error);
                setLoadingState(false);

                let message = error.message || 'Erreur lors de la vérification.';
                if (error.code === 'permission-denied') {
                    message = 'Accès refusé. Vérifiez les règles Firestore.';
                } else if (error.code === 'unavailable') {
                    message = 'Service indisponible. Vérifiez votre connexion.';
                }

                errorBox.textContent = `❌ ${message}`;
                errorBox.classList.add('show');
            }
        }

        function setLoadingState(isLoading) {
            if (isLoading) {
                btnText.textContent = 'Vérification';
                btnSpinner.classList.remove('hidden');
                submitBtn.disabled = true;
            } else {
                btnText.textContent = 'Se connecter';
                btnSpinner.classList.add('hidden');
                submitBtn.disabled = !isCodeComplete();
            }
        }


    </script>
</body>
</html>
